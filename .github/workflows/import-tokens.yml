name: Import Tokens

  on:
    push:
      paths:
        - 'tokens/*.json'
    workflow_dispatch:

  permissions:
    contents: write

  jobs:
    import:
      runs-on: ubuntu-latest
      steps:
        - uses: actions/checkout@v4
        - uses: actions/setup-node@v4
          with:
            node-version: '24'
        - name: Processar tokens importados
          run: node process-tokens.js
        - name: Commit se houver mudanças
          run: |
            git config user.name  "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git pull --rebase origin main
            git add alcance-design-system.html
            git diff --staged --quiet || git commit -m "chore: apply imported tokens"
            git push
